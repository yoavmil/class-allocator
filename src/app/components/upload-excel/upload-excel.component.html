<mat-card class="upload-card" appearance="raised">
  <mat-card-title> ברוכים הבאים למערכת שיבוץ תלמידים </mat-card-title>

  <mat-card-content>
    <p class="note" dir="rtl">
      אנא העלה קובץ Excel בפורמט המתאים עם העדפות התלמידים
    </p>

    <input
      type="file"
      id="excelInput"
      (change)="onFileSelected($event)"
      accept=".xlsx"
    />
    <button mat-raised-button (click)="fileInput.click()">
      בחר קובץ Excel
    </button>
    <input type="file" #fileInput hidden (change)="onFileSelected($event)" />
  </mat-card-content>
</mat-card>
